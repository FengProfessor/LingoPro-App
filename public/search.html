<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LingoPro - Tra Cứu Từ Điển</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4CAF50; --primary-dark: #388E3C;
            --bg: #0f172a; --card: #1e293b; --border: #334155;
            --text: #f8fafc; --muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 820px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.8rem; font-weight: 900; background: linear-gradient(135deg, #4CAF50, #8BC34A); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .header p { color: var(--muted); font-size: 0.95rem; }
        .server-badge { display: inline-block; margin-top: 10px; background: #1e293b; border: 1px solid var(--border); border-radius: 20px; padding: 4px 14px; font-size: 11px; color: var(--muted); }
        .server-badge span { color: var(--primary); font-weight: 600; }
        .config-panel { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; font-size: 13px; }
        .config-panel label { color: var(--muted); font-weight: 600; white-space: nowrap; }
        .config-panel input { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 8px; font-family: monospace; font-size: 13px; outline: none; }
        .config-panel input:focus { border-color: var(--primary); }
        #search-input { width: 100%; padding: 16px 24px; border-radius: 14px; border: 2px solid var(--border); background: var(--card); color: var(--text); font-size: 1.1rem; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.3s, box-shadow 0.3s; margin-bottom: 24px; }
        #search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(76,175,80,0.15); }
        #search-input::placeholder { color: var(--muted); }
        .source-tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px; margin-left: 8px; vertical-align: middle; text-transform: uppercase; }
        .source-bot { background: #14532d; color: #4ade80; }
        .source-ext { background: #1e3a5f; color: #60a5fa; }
        .card { background: var(--card); border-radius: 18px; padding: 28px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.3); display: none; animation: fadeIn 0.35s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* ── Image Banner ── */
        .word-image-banner {
            width: 100%; height: 220px;
            border-radius: 12px; margin-bottom: 20px;
            overflow: hidden; position: relative;
            background: var(--bg);
            display: none;
        }
        .word-image-banner img {
            width: 100%; height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }
        .word-image-banner:hover img { transform: scale(1.03); }
        .image-source-badge {
            position: absolute; bottom: 8px; right: 10px;
            font-size: 10px; background: rgba(0,0,0,0.6);
            color: #94a3b8; padding: 3px 8px; border-radius: 6px;
            backdrop-filter: blur(4px);
        }
        .image-placeholder {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem;
            background: linear-gradient(135deg, #1e293b, #0f172a);
        }

        .word-row { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 16px; margin-bottom: 16px; border-bottom: 1px solid var(--border); }
        .word-title { font-size: 2rem; font-weight: 900; }
        .ipa { font-size: 1rem; color: var(--primary); margin-top: 4px; }
        .audio-btn { background: var(--primary); color: white; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s, background 0.2s; flex-shrink: 0; }
        .audio-btn:hover { transform: scale(1.1); background: var(--primary-dark); }
        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
        .tag { background: var(--border); color: var(--muted); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .meaning-item { margin-bottom: 18px; }
        .pos { font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 6px; }
        .definition { font-size: 1.05rem; line-height: 1.6; font-weight: 500; }
        .example { margin-top: 10px; padding: 12px 16px; background: rgba(255,255,255,0.04); border-left: 3px solid var(--primary); border-radius: 0 8px 8px 0; font-style: italic; color: var(--muted); font-size: 0.9rem; }
        .collocations { margin-top: 8px; font-size: 0.85rem; color: #64748b; }
        .collocations b { color: #4CAF50; }
        .family-section { margin-top: 20px; padding-top: 16px; border-top: 1px dashed var(--border); }
        .family-title { font-size: 12px; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
        .family-words { display: flex; flex-wrap: wrap; gap: 8px; }
        .family-word { background: rgba(76,175,80,0.1); border: 1px solid rgba(76,175,80,0.3); color: #86efac; font-size: 12px; padding: 3px 10px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .family-word:hover { background: rgba(76,175,80,0.2); }
        .state-msg { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 1rem; }
        .state-msg .icon { font-size: 2.5rem; margin-bottom: 12px; }
        .loader { display: none; text-align: center; padding: 40px; color: var(--primary); font-size: 0.95rem; }
        .loader::before { content: ''; display: block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Stats bar */
        .stats-bar { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-chip { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 8px 16px; font-size: 12px; color: var(--muted); }
        .stat-chip b { color: var(--primary); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>LingoPro Dictionary</h1>
        <p>Tra cứu từ điển từ dữ liệu Bot đã cào</p>
        <div class="server-badge">Server: <span id="server-label">localhost:3000</span></div>
    </div>
    <div class="config-panel">
        <label>Server URL</label>
        <input type="text" id="server-url" value="" placeholder="https://your-app.vercel.app">
    </div>
    <div class="stats-bar" id="stats-bar" style="display:none">
        <div class="stat-chip">📚 Tổng từ: <b id="stat-total">–</b></div>
        <div class="stat-chip">🖼️ Có ảnh thật: <b id="stat-img">–</b></div>
        <div class="stat-chip">🎨 Placeholder: <b id="stat-ph">–</b></div>
        <div class="stat-chip">❌ Chưa có ảnh: <b id="stat-none">–</b></div>
    </div>
    <input type="text" id="search-input" placeholder="Nhập từ muốn tra (ví dụ: abundant, give up...)..." autocomplete="off" spellcheck="false">
    <div id="loader" class="loader">Đang tìm kiếm...</div>
    <div id="state-msg" class="state-msg"><div class="icon">📖</div>Nhập từ bất kỳ để tra cứu</div>
    <div id="result-card" class="card">
        <!-- Image Banner -->
        <div id="word-image-banner" class="word-image-banner">
            <img id="word-image" src="" alt="" loading="lazy">
            <div class="image-source-badge" id="image-source-badge"></div>
        </div>
        <div class="word-row">
            <div>
                <div><span id="res-word" class="word-title"></span><span id="res-source" class="source-tag"></span></div>
                <div id="res-ipa" class="ipa"></div>
            </div>
            <button class="audio-btn" onclick="playAudio()">🔊</button>
        </div>
        <div id="res-tags" class="tags"></div>
        <div id="res-meanings"></div>
        <div id="res-family" class="family-section" style="display:none">
            <div class="family-title">🌱 GIA ĐÌNH TỪ</div>
            <div id="res-family-words" class="family-words"></div>
        </div>
    </div>
</div>
<script>
    const searchInput = document.getElementById('search-input');
    const serverInput = document.getElementById('server-url');
    
    // Tự động lấy domain hiện tại làm server mặc định
    const defaultServer = window.location.origin;
    serverInput.value = defaultServer;
    document.getElementById('server-label').textContent = defaultServer.replace(/^https?:\/\//, '');

    const resultCard = document.getElementById('result-card');
    const stateMsg = document.getElementById('state-msg');
    const loader = document.getElementById('loader');
    let currentAudioUrl = '';
    let debounceTimer = null;

    serverInput.addEventListener('change', () => {
        document.getElementById('server-label').textContent = serverInput.value.replace('http://', '');
        loadStats();
    });

    // Load stats on page load
    async function loadStats() {
        const server = serverInput.value.trim().replace(/\/$/, '');
        try {
            const res = await fetch(`${server}/api/bot/fill-images`);
            if (!res.ok) return;
            const data = await res.json();
            document.getElementById('stat-total').textContent = data.total || 0;
            document.getElementById('stat-img').textContent = data.withRealImage || 0;
            document.getElementById('stat-ph').textContent = data.withPlaceholder || 0;
            document.getElementById('stat-none').textContent = data.withoutImage || 0;
            document.getElementById('stats-bar').style.display = 'flex';
        } catch {}
    }
    setTimeout(loadStats, 500);

    searchInput.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        const word = searchInput.value.trim().toLowerCase();
        if (!word) { showState('📖', 'Nhập từ bất kỳ để tra cứu'); return; }
        debounceTimer = setTimeout(() => lookupWord(word), 350);
    });

    async function lookupWord(word) {
        const server = serverInput.value.trim().replace(/\/$/, '');
        loader.style.display = 'block';
        resultCard.style.display = 'none';
        stateMsg.style.display = 'none';
        try {
            const res = await fetch(`${server}/api/dictionary/lookup?word=${encodeURIComponent(word)}`);
            loader.style.display = 'none';
            if (res.status === 404) { showState('🔍', `Không tìm thấy "<b>${word}</b>" trong DB. Cần cào thêm!`); return; }
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            renderResult(word, await res.json());
        } catch (err) {
            loader.style.display = 'none';
            showState('⚠️', `Không kết nối được server.<br><small>${err.message}</small>`);
        }
    }

    function renderResult(word, data) {
        document.getElementById('res-word').textContent = (data.word || word).toUpperCase();
        const src = document.getElementById('res-source');
        if (data.source === 'global_dictionary') { src.textContent = '🤖 Bot Data'; src.className = 'source-tag source-bot'; }
        else { src.textContent = '🌐 External'; src.className = 'source-tag source-ext'; }
        const pron = data.pronunciations?.[0] || {};
        document.getElementById('res-ipa').textContent = pron.ipa || '';
        currentAudioUrl = pron.audio_us || pron.audio_uk || '';

        // ── Hiển thị ảnh ──
        const banner = document.getElementById('word-image-banner');
        const img = document.getElementById('word-image');
        const imgBadge = document.getElementById('image-source-badge');
        if (data.image_url) {
            img.src = data.image_url;
            img.alt = `Illustration for ${word}`;
            img.onerror = () => { banner.style.display = 'none'; };
            const srcLabel = { pixabay: '📷 Pixabay', wikipedia: '📖 Wikipedia', placeholder: '🎨 Generated', ai_generated: '🤖 AI', none: '' };
            imgBadge.textContent = srcLabel[data.image_source] || '';
            banner.style.display = 'block';
        } else {
            banner.style.display = 'none';
        }

        const tagsDiv = document.getElementById('res-tags');
        tagsDiv.innerHTML = '';
        (data.tags || []).forEach(t => { const s = document.createElement('span'); s.className = 'tag'; s.textContent = t.replace(/-/g,' '); tagsDiv.appendChild(s); });
        const meaningsDiv = document.getElementById('res-meanings');
        meaningsDiv.innerHTML = '';
        (data.results || []).forEach(r => {
            (r.meanings || []).forEach(m => {
                const d = document.createElement('div');
                d.className = 'meaning-item';
                d.innerHTML = `<div class="pos">${m.pos||'word'}</div><div class="definition">${m.definition}</div>${m.example?`<div class="example">"${m.example}"</div>`:''}${m.collocations?.length?`<div class="collocations"><b>Collocations:</b> ${m.collocations.join(', ')}</div>`:''}`;
                meaningsDiv.appendChild(d);
            });
        });
        const fw = data.familyWords;
        if (fw?.length) {
            document.getElementById('res-family-words').innerHTML = fw.map(w=>`<span class="family-word" onclick="searchInput.value='${w.split(' ')[0]}';lookupWord('${w.split(' ')[0]}')">${w}</span>`).join('');
            document.getElementById('res-family').style.display='block';
        } else {
            document.getElementById('res-family').style.display='none';
        }
        resultCard.style.display = 'block';
    }

    function showState(icon, msg) { stateMsg.innerHTML = `<div class="icon">${icon}</div>${msg}`; stateMsg.style.display='block'; resultCard.style.display='none'; }
    function playAudio() {
        if (currentAudioUrl) { new Audio(currentAudioUrl).play().catch(speakWord); }
        else { speakWord(); }
    }
    function speakWord() { const w = document.getElementById('res-word').textContent; if(w){const u=new SpeechSynthesisUtterance(w.toLowerCase());u.lang='en-US';speechSynthesis.speak(u);} }
</script>
</body>
</html>
