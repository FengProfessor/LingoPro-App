<!DOCTYPE html>
<html>
<body>
<script>
fetch('https://pixabay.com/api/?key=55379181-67723720b7ad00920f6b5655d&q=dog&image_type=photo')

.then(d => document.body.innerHTML = 'Success: ' + d.hits[0].webformatURL)
